<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SetFlow.ai — Promo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
    }

    .card {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(145deg, #0a0f1a 0%, #0d1117 40%, #0a0f1a 100%);
      border-radius: 0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
    }

    /* Glow effects */
    .card::before {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: -150px;
      left: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Grid pattern */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-dot {
      width: 28px;
      height: 28px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.6), 0 0 60px rgba(34, 197, 94, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.6), 0 0 60px rgba(34, 197, 94, 0.2); }
      50% { box-shadow: 0 0 30px rgba(34, 197, 94, 0.8), 0 0 80px rgba(34, 197, 94, 0.3); }
    }

    .logo-text {
      font-size: 42px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -1px;
    }

    .headline {
      font-size: 72px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1.1;
      letter-spacing: -3px;
      max-width: 900px;
    }

    .headline .highlight {
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 400;
      max-width: 700px;
      line-height: 1.5;
    }

    .features {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    .feature-pill {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px 28px;
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 18px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    .feature-pill .emoji {
      margin-right: 8px;
    }

    .bottom-bar {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-top: 20px;
    }

    .badge {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #000;
      padding: 16px 36px;
      border-radius: 100px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .github-tag {
      color: rgba(255, 255, 255, 0.4);
      font-size: 18px;
      font-weight: 500;
    }

    .github-tag span {
      color: rgba(255, 255, 255, 0.7);
    }

    /* Corner accents */
    .corner-tl, .corner-br {
      position: absolute;
      width: 80px;
      height: 80px;
      pointer-events: none;
      z-index: 1;
    }
    .corner-tl {
      top: 30px; left: 30px;
      border-top: 2px solid rgba(34, 197, 94, 0.3);
      border-left: 2px solid rgba(34, 197, 94, 0.3);
    }
    .corner-br {
      bottom: 30px; right: 30px;
      border-bottom: 2px solid rgba(34, 197, 94, 0.3);
      border-right: 2px solid rgba(34, 197, 94, 0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="grid-bg"></div>
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="content">
      <div class="logo-section">
        <div class="logo-dot"></div>
        <div class="logo-text">SetFlow.ai</div>
      </div>

      <h1 class="headline">
        Your AI That <span class="highlight">Books Meetings</span> While You Sleep
      </h1>

      <p class="subtitle">
        AI-powered appointment setter that captures leads, handles objections, and books calls — on complete autopilot.
      </p>

      <div class="features">
        <div class="feature-pill"><span class="emoji">🤖</span> AI Chat Agent</div>
        <div class="feature-pill"><span class="emoji">📊</span> Lead Dashboard</div>
        <div class="feature-pill"><span class="emoji">📅</span> Auto-Booking</div>
        <div class="feature-pill"><span class="emoji">🔗</span> Webhook Integration</div>
      </div>

      <div class="bottom-bar">
        <div class="badge">Free & Open Source</div>
        <div class="github-tag">github.com/<span>voidreformer/setflow-ai</span></div>
      </div>
    </div>
  </div>
</body>
</html>
